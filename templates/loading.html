<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운명을 읽는 중 - GLOW글로우:갓생사주</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.png') }}">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Pretendard', sans-serif;
        }

        .loading-text {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(90deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .loading-text.visible {
            opacity: 1;
        }

        .sub-text {
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Twinkling Stars */
        .stars-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 2rem;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #f59e0b;
            animation: twinkle 1.5s infinite alternate;
        }

        /* Random positioning for stars */
        .star:nth-child(1) {
            top: 20%;
            left: 20%;
            width: 4px;
            height: 4px;
            animation-delay: 0s;
        }

        .star:nth-child(2) {
            top: 30%;
            right: 20%;
            width: 6px;
            height: 6px;
            animation-delay: 0.3s;
        }

        .star:nth-child(3) {
            bottom: 30%;
            left: 30%;
            width: 5px;
            height: 5px;
            animation-delay: 0.6s;
        }

        .star:nth-child(4) {
            bottom: 20%;
            right: 30%;
            width: 3px;
            height: 3px;
            animation-delay: 0.9s;
        }

        .star:nth-child(5) {
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            animation-delay: 1.2s;
            transform: translate(-50%, -50%);
        }

        .star:nth-child(6) {
            top: 10%;
            left: 50%;
            width: 4px;
            height: 4px;
            animation-delay: 0.5s;
        }

        .star:nth-child(7) {
            bottom: 10%;
            right: 50%;
            width: 5px;
            height: 5px;
            animation-delay: 0.8s;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.3;
                transform: scale(0.8);
            }

            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }
    </style>
</head>

<body>
    <!-- Twinkling Stars Animation -->
    <div class="stars-container">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <div class="msg-container">
        <div id="loading-msg" class="loading-text visible">운명을 읽고 나를 켜다</div>
    </div>
    <div class="sub-text">잠시만 기다려 주세요. 당신의 운명을 비추는 중입니다.</div>

    <script>
        const messages = [
            "운명을 읽고 나를 켜다",
            "당신의 사주 원국을 해독 중입니다...",
            "10년의 대운 흐름을 살피고 있습니다...",
            "깊이 있는 심층 조언을 갈무리하고 있습니다...",
            "당신의 인생 지도를 완성 중입니다..."
        ];
        let idx = 0;
        const msgEl = document.getElementById('loading-msg');
        function rotate() {
            msgEl.classList.remove('visible');
            setTimeout(() => {
                idx = (idx + 1) % messages.length;
                msgEl.textContent = messages[idx];
                msgEl.classList.add('visible');
            }, 500);
        }
        setInterval(rotate, 3000);

        // 세션 방식에 맞춰 GET으로 결과 페이지 호출 (405 에러 방지)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                window.location.replace('/result');
            }, 300);
        });
    </script>
</body>

</html>
