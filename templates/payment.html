<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOW 프리미엄 분석 결제</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency=USD"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            padding: 2rem;
        }

        .payment-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 2rem;
        }

        .payment-title {
            text-align: center;
            color: #fbbf24;
            font-family: 'Cinzel', serif;
            margin-bottom: 2rem;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-item:hover {
            border-color: rgba(251, 191, 36, 0.5);
        }

        .option-item.selected {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fbbf24;
        }

        .option-info h4 {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
        }

        .option-info p {
            margin: 0;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .option-price {
            font-weight: bold;
            font-size: 1.2rem;
            color: #fbbf24;
        }

        .total-price {
            text-align: right;
            font-size: 1.5rem;
            margin: 2rem 0;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #fbbf24;
        }

        .paypal-container {
            margin-top: 1rem;
        }

        .best-badge {
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <div class="payment-container">
        <h2 class="payment-title">프리미엄 사주 분석 옵션 선택</h2>
        <p style="text-align: center; color: #cbd5e1; margin-bottom: 2rem;">원하시는 분석 항목을 선택해 주세요.</p>

        <!-- 옵션 리스트 -->
        <div class="option-list">
            <!-- 1. 기본 분석 -->
            <div class="option-item" onclick="toggleOption('opt_basic')">
                <div class="option-info">
                    <h4><i class="fa-solid fa-scroll"></i> 총 운세 <input type="checkbox" id="opt_basic" value="9.99"
                            class="pkg-check" style="display:none;" onchange="calculateTotal()"></h4>
                    <p>사주 뼈대 + 맞춤형 오라클 카드</p>
                </div>
                <div class="option-price">$9.99</div>
            </div>

            <!-- 2. 올해의 운세 -->
            <div class="option-item" onclick="toggleOption('opt_year')">
                <div class="option-info">
                    <h4><i class="fa-solid fa-leaf"></i> 올해의 운세 <input type="checkbox" id="opt_year" value="3.99"
                            class="pkg-check" style="display:none;" onchange="calculateTotal()"></h4>
                    <p>2026년 집중 분석</p>
                </div>
                <div class="option-price">$3.99</div>
            </div>

            <!-- 3. 재물운 -->
            <div class="option-item" onclick="toggleOption('opt_wealth')">
                <div class="option-info">
                    <h4><i class="fa-solid fa-coins"></i> 재물운 <input type="checkbox" id="opt_wealth" value="3.99"
                            class="pkg-check" style="display:none;" onchange="calculateTotal()"></h4>
                    <p>직장/사업/투자 분석</p>
                </div>
                <div class="option-price">$3.99</div>
            </div>

            <!-- 4. 연애운 -->
            <div class="option-item" onclick="toggleOption('opt_love')">
                <div class="option-info">
                    <h4><i class="fa-solid fa-heart"></i> 연애운 <input type="checkbox" id="opt_love" value="3.99"
                            class="pkg-check" style="display:none;" onchange="calculateTotal()"></h4>
                    <p>인간관계/애정 분석</p>
                </div>
                <div class="option-price">$3.99</div>
            </div>

            <!-- 5. 풀패키지 -->
            <div class="option-item" onclick="toggleOption('opt_full')">
                <div class="option-info">
                    <h4><i class="fa-solid fa-crown"></i> GLOW 프리미엄 풀패키지 <span class="best-badge">BEST!</span> <input
                            type="checkbox" id="opt_full" value="19.99" style="display:none;"
                            onchange="calculateTotal()"></h4>
                    <p>모든 운세 통합본 + 특별 조언 (할인가 적용)</p>
                </div>
                <div class="option-price">$19.99</div>
            </div>
        </div>

        <!-- 총액 표시 -->
        <div class="total-price">
            Total: <span id="total-amount">$0.00</span>
        </div>

        <!-- 페이팔 버튼 영역 -->
        <div id="paypal-button-container" class="paypal-container"></div>
    </div>

    <!-- 보이지 않는 양식: 결제 성공 후 premium_result 로 넘어갈 데이터 -->
    <form id="premiumForm" action="/premium_result" method="POST" style="display: none;">
        <input type="hidden" name="name" value="{{ original_form.get('name', '') }}">
        <input type="hidden" name="gender" value="{{ original_form.get('gender', '') }}">
        <input type="hidden" name="birth_date" value="{{ original_form.get('birth_date', '') }}">
        <input type="hidden" name="birth_time" value="{{ original_form.get('birth_time', '') }}">
        <input type="hidden" name="calendar_type" value="{{ original_form.get('calendar_type', '') }}">
        <input type="hidden" name="is_leap" value="{{ original_form.get('is_leap', '') }}">
        <!-- 결제한 상품 리스트 -->
        <input type="hidden" name="purchased_items" id="purchased_items" value="">
    </form>

    <script>
        let currentTotal = 0.00;

        // 디폴트로 풀패키지 선택
        window.onload = function () {
            toggleOption('opt_full');
        };

        function toggleOption(id) {
            const checkbox = document.getElementById(id);

            // 풀패키지를 선택한 경우
            if (id === 'opt_full') {
                checkbox.checked = !checkbox.checked;
                const isFull = checkbox.checked;

                // 다른 낱개 옵션들 모두 해제
                const others = document.querySelectorAll('.pkg-check');
                others.forEach(cb => {
                    cb.checked = false;
                    cb.parentElement.parentElement.parentElement.classList.remove('selected');
                });

                if (isFull) {
                    checkbox.parentElement.parentElement.parentElement.classList.add('selected');
                } else {
                    checkbox.parentElement.parentElement.parentElement.classList.remove('selected');
                }
            }
            // 낱개 옵션을 선택한 경우
            else {
                checkbox.checked = !checkbox.checked;
                // 풀패키지 선택 해제
                const fullCheck = document.getElementById('opt_full');
                if (fullCheck.checked) {
                    fullCheck.checked = false;
                    fullCheck.parentElement.parentElement.parentElement.classList.remove('selected');
                }

                if (checkbox.checked) {
                    checkbox.parentElement.parentElement.parentElement.classList.add('selected');
                } else {
                    checkbox.parentElement.parentElement.parentElement.classList.remove('selected');
                }
            }

            calculateTotal();
        }

        function calculateTotal() {
            currentTotal = 0;
            const allChecks = document.querySelectorAll('input[type="checkbox"]');
            let selectedItems = [];
            allChecks.forEach(cb => {
                if (cb.checked) {
                    currentTotal += parseFloat(cb.value);
                    selectedItems.push(cb.id);
                }
            });
            document.getElementById('total-amount').innerText = "$" + currentTotal.toFixed(2);
            document.getElementById('purchased_items').value = selectedItems.join(',');
        }

        // PayPal Buttons 연동
        paypal.Buttons({
            createOrder: function (data, actions) {
                if (currentTotal <= 0) {
                    alert("옵션을 하나 이상 선택해 주세요.");
                    return;
                }
                return actions.order.create({
                    purchase_units: [{
                        amount: {
                            value: currentTotal.toFixed(2)
                        }
                    }]
                });
            },
            onApprove: function (data, actions) {
                return actions.order.capture().then(function (details) {
                    alert('결제가 완료되었습니다! 프리미엄 결과를 생성합니다.');
                    // 폼을 서브밋하여 /premium_result 로 이동
                    document.getElementById('premiumForm').submit();
                });
            },
            onError: function (err) {
                console.error('PayPal Checkout onError', err);
                // 테스트 모드 등에서 에러 발생 시, 개발 편의성을 위해 무조건 넘어갈지 아니면 막을지는 환경에 따라 다름.
                // alert('결제 중 오류가 발생했습니다.');
            }
        }).render('#paypal-button-container');
    </script>

</body>

</html>
